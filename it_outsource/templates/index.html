<!-- ==========================================
     ФАЙЛ 4: templates/add_client.html
     Форма добавления нового клиента в систему
     ========================================== -->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить клиента</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">IT-Аутсорсинг БД</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link active btn btn-primary text-white ms-2" href="/add_client">Добавить клиента</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0">Форма регистрации нового контрагента (INSERT)</h5>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Название компании</label>
                                <input type="text" name="company_name" class="form-control" placeholder="Например: ООО Вектор" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Контактное лицо</label>
                                <input type="text" name="contact_person" class="form-control" placeholder="ФИО представителя" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Электронная почта (Email)</label>
                                <input type="email" name="email" class="form-control" placeholder="name@company.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Номер телефона</label>
                                <input type="tel" name="phone" class="form-control" placeholder="+7 (999) 000-00-00" required>
                            </div>
                            <div class="d-flex justify-content-between mt-4">
                                <a href="/" class="btn btn-outline-secondary px-4">Отмена</a>
                                <button type="submit" class="btn btn-success px-4">Сохранить запись</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
